# CI (PRD section 7 matrix; Phase 1 exit criteria 1, 5, 6, 7; Phase 2
# exit criterion 8; Phase 5 exit criteria 3 and 6).
# Honesty rule: no continue-on-error anywhere — a red gate is a red build.
name: ci

on:
  push:
    # Phase branches get the full matrix before merge: the sprint methodology
    # gates each phase merge on green CI, so waiting for a PR event would
    # serialize verification behind PR plumbing.
    branches: [main, 'phase-*']
  pull_request:
  workflow_dispatch:

jobs:
  # Exit criteria 1 and 7: the wheel builds and installs on all four legs,
  # the Python suite passes, and `star verify --quick` finishes under 60 s
  # with a PASS verdict. Criterion 7 targets the ARM leg (Pi 5 proxy), but
  # the timing gate is enforced on every leg — a slower leg failing it is
  # information, not noise.
  build-test:
    strategy:
      # All legs report even when one fails, so a platform-specific defect
      # is visible in a single CI round-trip.
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package (builds the native core)
        run: pip install .
      - name: Install the pandas/parquet extras (one leg only)
        # Phase 5 exit criterion 3 is "CI-gated": the Parquet/pandas suites
        # are importorskip-gated and would otherwise never execute, so
        # exactly one leg installs the documented extras to run them; the
        # other three legs stay extras-free so the bare-install path (loader
        # and CSV/NPZ export with no optional dependencies) keeps coverage.
        if: matrix.os == 'ubuntu-24.04'
        run: pip install '.[pandas,parquet]'
      - name: Install test dependencies
        run: pip install pytest
      - name: Run Python test suite
        # Serial on purpose: no -n auto (project resource-containment rule,
        # and parallel workers would blur determinism-gate diagnostics).
        run: pytest tests/python -q
      - name: star verify --quick (timed gate)
        # Inline wrapper instead of `time`/`timeout` shell tools so the same
        # step runs identically on POSIX and Windows runners. Fails on:
        # nonzero exit, wall time >= 60 s, or a missing PASS verdict.
        shell: python
        run: |
          import subprocess
          import sys
          import time

          start = time.monotonic()
          proc = subprocess.run(
              ["star", "verify", "--quick"],
              capture_output=True,
              text=True,
          )
          elapsed = time.monotonic() - start
          output = proc.stdout + proc.stderr
          print(output)
          print(f"wall time: {elapsed:.1f} s")
          if proc.returncode != 0:
              sys.exit(f"star verify --quick exited {proc.returncode}")
          if elapsed >= 60.0:
              sys.exit(f"star verify --quick took {elapsed:.1f} s (gate: < 60 s)")
          if "VERIFY: PASS" not in output:
              sys.exit("output does not contain 'VERIFY: PASS'")
      # Phase 2 exit criterion 8, per-leg half: propagate the reference
      # mission and publish this leg's final truth state at full precision
      # (float.hex()) for the cross-platform-divergence job below.
      - name: Propagate the reference mission (criterion 8)
        shell: bash
        run: star run missions/twobody_leo.toml -o "$RUNNER_TEMP/c8-run"
      - name: Extract the final truth state
        shell: bash
        run: >-
          python scripts/cross_platform_divergence.py extract
          --srlog "$RUNNER_TEMP/c8-run/run.srlog"
          --leg "${{ matrix.os }}"
          --out finalstate/finalstate.json
      - name: Upload the final-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: finalstate-${{ matrix.os }}
          path: finalstate/finalstate.json
          if-no-files-found: error

  # Phase 2 exit criterion 8, aggregation half: the cross-platform
  # final-state divergence on the two-body reference propagation is
  # measured across all four legs, published as a commit status readable
  # without authentication, and gated against the committed record
  # tests/golden/determinism/cross_platform.toml (divergence definition
  # and gate rules in scripts/cross_platform_divergence.py). Bootstrap:
  # the record is committed as pending-first-measurement, so the FIRST run
  # of this job fails by design; the maintainer transcribes the measured
  # value from the commit status into the record (procedure in the
  # record's comments) and the rerun goes green.
  cross-platform-divergence:
    needs: build-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: finalstate-*
          path: finalstates
      - name: Measure the max pairwise relative divergence
        id: measure
        run: |
          # pipefail so a measure failure fails this step directly instead of
          # relying on the downstream grep/gate steps to notice the gap.
          set -o pipefail
          python scripts/cross_platform_divergence.py measure \
            --dir finalstates --expect-legs 4 \
            --bound 1e-9 --out measurement.json | tee measure.log
          grep -E '^(max_rel|status_state)=' measure.log >> "$GITHUB_OUTPUT"
      - name: Publish the measurement as a commit status
        # A commit status (unlike job logs) is readable without
        # authentication on a public repository, which is how the measured
        # value reaches the maintainer machine (no gh CLI there). Skipped
        # on pull_request events, whose token cannot write statuses from
        # forks; the gate step below still enforces the bound there.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: ${{ steps.measure.outputs.status_state }}
          MAX_REL: ${{ steps.measure.outputs.max_rel }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"determinism/cross-platform\",\"description\":\"max_rel=$MAX_REL (bound 1e-9, 4 legs)\",\"target_url\":\"$RUN_URL\"}"
      - name: Gate against the committed record
        run: >-
          python scripts/cross_platform_divergence.py gate
          --measurement measurement.json
          --record tests/golden/determinism/cross_platform.toml
          --bound 1e-9

  # C++ unit tests (doctest via CTest) with warnings-as-errors. A plain
  # configure is used rather than a preset so this job has no coupling to
  # preset binary-directory naming; the determinism flags are applied
  # unconditionally by the core CMakeLists, not by any preset.
  # -Wshadow is listed explicitly because -Wall -Wextra does not imply it:
  # four name-shadowing defects reached the Phase 6 branch and were caught
  # only by MSVC /W4 (C4457/C4458), which no CI job builds. GCC diagnoses
  # the same four sites once the flag is present.
  cpp-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure (warnings as errors)
        run: >-
          cmake -S . -B build/ci
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wshadow -Werror"
      - name: Build
        run: cmake --build build/ci --parallel 4
      - name: Run doctest suite
        run: ctest --test-dir build/ci --output-on-failure

  # Exit criterion 5: both PDFs build with zero LaTeX errors on a clean
  # clone, the FR-29 chapter lint is green, and the PDFs are uploaded as
  # artifacts. The lint runs before the build so a documentation-accretion
  # failure is reported even when LaTeX would also fail.
  docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install TeX Live and latexmk
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends
          latexmk biber
          texlive-latex-base texlive-latex-recommended texlive-latex-extra
          texlive-fonts-recommended texlive-bibtex-extra texlive-science
      - name: Install package (provides the `star docs` command)
        run: pip install .
      - name: Chapter-manifest lint (FR-29 accretion gate)
        run: python scripts/lint_chapters.py
      - name: Build both PDFs
        run: star docs
      - name: Assert both PDFs exist
        run: |
          test -f docs/mathlib/mathlib.pdf
          test -f docs/report/report.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: docs-pdfs
          path: |
            docs/mathlib/mathlib.pdf
            docs/report/report.pdf
          if-no-files-found: error

  # Exit criterion 6: CITATION.cff validates against the CFF schema and the
  # README BibTeX block matches it field for field.
  citation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cffconvert
        run: pip install cffconvert
      - name: Validate CITATION.cff
        run: cffconvert --validate
      - name: Check README BibTeX consistency
        run: python scripts/check_citation.py

  # Phase 5 exit criterion 6, size half (FR-32): every platform wheel stays
  # under the 20 MB budget. Built with --no-deps because the budget measures
  # this project's artifact, not its dependency tree, and measured on all
  # four legs because the compiled core's size is platform-specific.
  wheel-budget:
    strategy:
      # All legs report even when one fails, so a platform-specific size
      # blowout is visible in a single CI round-trip.
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the wheel
        run: pip wheel . --no-deps -w dist
      - name: Assert the wheel is under the 20 MB budget
        # Inline Python instead of shell arithmetic so the same step runs
        # identically on POSIX and Windows runners. Decimal megabytes (1 MB
        # = 1e6 B): the SI reading of FR-32's "20 MB", and the stricter one.
        shell: python
        run: |
          import pathlib
          import sys

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              sys.exit(f"expected exactly one wheel in dist/, found: {wheels}")
          size = wheels[0].stat().st_size
          budget = 20 * 1000 * 1000
          print(f"{wheels[0].name}: {size} bytes = {size / 1e6:.2f} MB (budget: 20 MB)")
          if size >= budget:
              sys.exit(f"wheel exceeds the FR-32 budget: {size} >= {budget} bytes")

  # Phase 5 exit criterion 6, dependency half (FR-32): in a fresh venv, the
  # installed distribution set after installing the built wheel with NO
  # extras exactly equals the committed D-12 closure
  # (tests/golden/packaging/runtime_deps.toml), both directions. The wheel —
  # not an editable install — is what a user's pip resolves, so that is what
  # the gate audits. Run on all four legs (it is cheap) because the equality
  # gate would also catch a platform-conditional dependency sneaking into
  # the closure on one platform only.
  dep-minimality:
    strategy:
      # All legs report even when one fails, so a platform-specific
      # dependency drift is visible in a single CI round-trip.
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the wheel
        run: pip wheel . --no-deps -w dist
      - name: Install the wheel into a fresh venv and audit the closure
        # bash on every leg so one script handles the bin/ (POSIX) versus
        # Scripts/ (Windows) venv layout split. check_min_deps.py runs WITH
        # the fresh venv's interpreter so importlib.metadata enumerates
        # exactly the environment under audit; the script is stdlib-only, so
        # the fresh venv needs no tooling beyond the wheel it is auditing.
        shell: bash
        run: |
          python -m venv fresh
          if [ -x fresh/bin/python ]; then VPY=fresh/bin/python; else VPY=fresh/Scripts/python; fi
          "$VPY" -m pip install --quiet dist/*.whl
          "$VPY" scripts/check_min_deps.py --expected tests/golden/packaging/runtime_deps.toml
