source = "hand-written for this item; expected hex constants captured from the pinned truth.parquet/events.parquet as described in [golden].generation"
citation = "MathWorks MATLAB documentation for parquetread (introduced R2019a), num2hex, and table; Parquet layout under test: docs/formats/parquet_v1.md (star export --parquet, PRD FR-17/D-13)"
generation = "committed as written; validates row counts, column names/order, column classes, and bit-exact spot values, printing one ok/FAIL line per check and a final MATLAB-PARQUET: PASS/FAIL verdict"
date = "2026-07-04"
tolerance = "bit-exact by design (num2hex string equality); any mismatch is a FAIL"

