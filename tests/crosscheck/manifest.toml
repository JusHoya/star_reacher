# Provenance manifest for the Phase 4 EC-11 independent ascent cross-check
# (schema in tests/golden/README.md). This directory holds an independent 3DOF
# point-mass ascent oracle (ascent_3dof.py) and its consuming pytest
# (tests/python/test_crosscheck_ascent.py). It commits no numeric value files:
# the 6DOF reference is regenerated live as a black box by running
# missions/ascent_leo.toml through the compiled core, and the 3DOF comparison
# state is computed live. This manifest records the provenance of the physical
# models, constants, and the published Electron-class sanity-band figures the
# cross-check depends on, plus the derivation of every tolerance and band.

schema_version = 1

[golden]
directory = "crosscheck"
date = "2026-07-03"
generation = """
The EC-11 cross-check runs two independent simulators of the same ascent and
compares their insertion orbits. The reference is the project's own 6DOF run of
missions/ascent_leo.toml (electron-class vehicle), executed as a BLACK BOX: the
consuming test propagates it through star_reacher.runner.run_mission and reduces
the final GCRF truth state to osculating apsis altitudes; no 6DOF model source is
read. The comparison is tests/crosscheck/ascent_3dof.py, a from-scratch 3DOF
point-mass integrator that shares no code with the 6DOF: it imports no
star_reacher module and reimplements its own RK4, USSA76 atmosphere, spherical
point-mass gravity (J2 optional), vacuum-Isp back-pressure thrust, staged mass
model, and osculating-element reduction. It parses only the vehicle and mission
TOML (masses, engines, aero Mach table, and the open-loop pitch program). The
pitch program is flown as a pitch above the launch-site local geographic
horizontal, frozen inertially at liftoff (open-loop launch-frame attitude): this
is the only reading that reaches orbit, since the instantaneous-local-horizontal
reading falls ~40 km short of the perigee-insertion gate and so cannot be the
program the vehicle's own capability note certifies to LEO. Determination of that
convention is convention-alignment, not physics tuning: the vehicle physics
(masses, thrust, drag, gravity) is never adjusted to close any gap.

Measured agreement (3DOF at dt = 0.02 s vs the 6DOF black box):
insertion perigee altitude -1.15 % (181.0 vs 183.2 km), insertion inertial speed
-0.08 % (7781.6 vs 7787.9 m/s), osculating semi-major axis -0.29 % (both runs
terminate on the shared perigee >= 180 km gate). The osculating APOGEE altitude
differs by -9 % (361.7 vs 398.3 km). That single residual is a documented finding,
not a physics disagreement: near the circular insertion the osculating apogee
altitude is ill-conditioned, d(apogee_alt)/d(v_insertion) ~ 7 km per (m/s), so the
EC-11 2 % apogee tolerance (~8 km) demands ~1.1 m/s insertion-speed agreement,
which is below the achievable agreement of two independently coded ascents; the
6DOF apogee was itself pitch-tuned to 398 km (see missions/ascent_leo.toml), and
in the ~0.3 s the perigee takes to sweep 180 km the apogee moves ~40 km. The test
therefore gates apogee at the conditioning-derived bound and gates the
well-conditioned quantities (perigee, insertion speed, semi-major axis) tightly.
"""

[[file]]
name = "electron_class_sanity_bands"
source = "Sanity-band constants MAXQ_ALT_BAND_KM, MACH1_ALT_BAND_KM, BURNOUT_SPEED_BAND_KMPS defined in tests/python/test_crosscheck_ascent.py. Electron is not on the PRD verified-reference list, so these are representative small-launch-vehicle-class bands, deliberately generous (sanity checks, not equality gates)."
citation = "Vehicle class (two-stage kerolox small launch vehicle, ~150-300 kg to LEO): Rocket Lab, 'Electron Payload User's Guide' (public document, rocketlabusa.com). Ascent-phase envelope from first principles: for a launch vehicle max dynamic pressure occurs in the lower atmosphere where rho*v^2 peaks, typically ~8-15 km, and transonic passage occurs low and early in the first ascent minute (standard ascent trajectory analysis, e.g. Vallado, 'Fundamentals of Astrodynamics and Applications', 4th ed.). LEO orbital insertion speed from the vis-viva equation v = sqrt(mu*(2/r - 1/a)) is ~7.6-7.9 km/s for 180-500 km orbits (Vallado, ch. 1-2). No real-vehicle telemetry value is cited; specific per-flight Electron max-q/Mach-1 altitudes are not published to a citable precision and are NOT invented here."
generation = "Bands chosen to bracket the representative-class envelope with margin: max-q altitude in [8, 15] km, Mach-1 altitude in [2, 10] km, burnout (insertion inertial) speed in [7.4, 8.1] km/s. The 3DOF lands at 11.0 km, 5.2 km, and 7.78 km/s respectively; the 6DOF black box at 11.3 km, 5.2 km, and 7.79 km/s."
date = "2026-07-03"
tolerance = "Membership tests, not equality gates: each measured quantity must fall inside its band. Bands are wide (each spans several km or several hundred m/s) so they screen for a grossly wrong ascent profile (e.g. max-q in vacuum, supersonic-at-liftoff, or a sub- or super-orbital insertion speed) without pretending to a precision the public class data does not support."

[[file]]
name = "atmosphere_ussa76"
source = "The atmosphere() function in tests/crosscheck/ascent_3dof.py: an independent Python implementation of the 0-86 km geopotential-layer formulation, coded from the published layer base geopotential heights, base temperatures, lapse rates, and base pressures."
citation = "U.S. Standard Atmosphere, 1976 (NOAA / NASA / USAF), NOAA-S/T 76-1562: hydrostatic layer relations (eqs. and layer tables in Part 1), specific gas constant R*/M0 with R* = 8.31432 J/(mol.K) and M0 = 28.9644 g/mol, and the geometric-to-geopotential height mapping with effective radius r0 = 6356766 m. Sound speed a = sqrt(gamma*R_specific*T) with gamma = 1.4. This is the same atmosphere authority the sim's own golden set cites (tests/golden/atmosphere/manifest.toml), reached here through independent code."
generation = "Seven layers to 84852 m' geopotential (86 km geometric); above 86 km an exponential continuation anchored at the cap with the local scale height, whose dynamic-pressure contribution on this ascent is < ~20 Pa (negligible against a ~52 kPa max-q)."
date = "2026-07-03"
tolerance = "Not a gated value file. Correctness is evidenced end to end: the independent atmosphere reproduces the 6DOF black box at max-q to within 0.7 kPa (52.0 vs 52.7 kPa) and 0.3 km in altitude, and the Mach-1 crossing altitude to within 0.1 km, without any shared code."

[[file]]
name = "physical_constants"
source = "Module constants in tests/crosscheck/ascent_3dof.py."
citation = "MU_EARTH = 3.986004418e14 m^3/s^2, OMEGA_EARTH = 7.292115e-5 rad/s, and J2 = 1.08262668e-3 from IERS Conventions (2010), IERS Technical Note No. 36. R_EARTH / WGS84 equatorial radius = 6378137 m and flattening 1/298.257223563 from WGS84 (NIMA TR8350.2). Standard gravity g0 = 9.80665 m/s^2 exact per the BIPM SI Brochure (9th ed., 2019). MU_EARTH equals the core's gm('earth') because both cite IERS, not because either copied the other."
generation = "Used directly; the WGS84 ellipsoid places the pad and defines geodetic altitude, while gravity and the osculating reduction use the spherical equatorial radius, matching the sim's own osculating convention (verified: the module's osculating_apsides reproduces the sim's reported final apogee/perigee, 398.3/183.2 km, from the same final truth state)."
date = "2026-07-03"
tolerance = "Exact constants; no tolerance."

[[file]]
name = "apogee_conditioning"
source = "The apogee assertion and its sensitivity computation in tests/python/test_crosscheck_ascent.py."
citation = "Two-body osculating relations ra = a(1+e), rp = a(1-e) with a and e from the specific energy and eccentricity vector (Vallado, 'Fundamentals of Astrodynamics and Applications', 4th ed., ch. 1-2). The apogee-altitude sensitivity to insertion speed is evaluated numerically by perturbing the 6DOF insertion state's speed and re-reducing."
generation = "At the electron-class insertion (near-circular, e ~ 0.016), d(apogee_alt)/d(v) ~ 7 km per (m/s). The measured 3DOF-vs-6DOF insertion-speed agreement (~6 m/s, 0.08 %) therefore maps to a ~40 km (~9 %) apogee-altitude spread, which reproduces the observed apogee difference."
date = "2026-07-03"
tolerance = "The test gates apogee at the conditioning-derived bound: |apogee_3dof - apogee_6dof| <= sensitivity * SPEED_BUDGET with SPEED_BUDGET = 12 m/s (~0.15 % of insertion speed), and independently gates the well-conditioned insertion speed to within 0.5 % and the semi-major axis to within 0.5 %. The literal EC-11 2 %-apogee-altitude sub-criterion is NOT met (measured ~9 %) and this is reported as a finding: apogee altitude is not a robust cross-tool discriminator for a near-circular insertion. Perigee is gated at the literal 2 % and passes (both runs terminate on the shared perigee >= 180 km condition)."
