# Provenance manifest for the Phase 6 independent-reference set (schema in
# tests/golden/README.md). This directory holds NumPy reference implementations
# of the quantities Phase 6 exit criteria 1, 2, 6, 7, and 9 gate, plus their
# consuming pytests under tests/python/test_refs_*.py. It commits no numeric
# value files: every reference number is either computed live from a cited
# formula or generated from a seeded synthetic signal whose coefficients are
# known by construction. This manifest records the provenance of every formula,
# the derivation of every tolerance, and the independence discipline the set
# exists to satisfy.

schema_version = 1

[golden]
directory = "refs"
date = "2026-07-19"
generation = """
INDEPENDENCE DISCIPLINE. These modules are BLIND references: they were written
from the Phase 6 math-library chapters (docs/mathlib/chapters/sensors_imu.tex,
sensors_optical.tex, sensors_radio.tex, camera.tex, notation.tex, ekf.tex) and
from the published sources those chapters cite, without reading the C++ sensor
implementations they check. A reference derived by reading the implementation
reproduces that implementation's defects and makes any agreement circular, so
the chapters -- the normative specification -- are the only implementation-side
input. Where a chapter is ambiguous the ambiguity is recorded in the module
docstring and the reading justified from the cited source, rather than resolved
by inspecting code.

ONE MODULE IS EXEMPT, AND SAYS SO. pd_attitude.py cannot claim blindness in
that sense: the PD law's normative statement is a specification comment carried
in the implementation's own header, so the specification and the implementation
share a file. Its entry below records what it does and does not read, and
anchors it on the mpmath golden set -- produced by neither implementation --
rather than on a claim of independent derivation. The exemption is named here
so the blanket wording above is not read as covering it.

DEPENDENCIES. NumPy and the Python standard library only. SciPy is deliberately
NOT imported even where it is installed, so the references remain usable under
the D-12 runtime allowed-list; chi-square quantiles are obtained by inverting
the regularized incomplete gamma function in tests/refs/chi2.py rather than by
importing a statistics package. Nothing here imports star_reacher, so the whole
set runs on a checkout with no compiled core.

VALIDATION STRATEGY. Each reference is validated against something that is not
an implementation: a closed form, an analytic limit, a convergence order, a
synthetic signal with known coefficients, or the reference's own inverse. The
per-module details are in the [[file]] entries below.
"""

[[file]]
name = "chi2.py"
source = """
Classical series and continued-fraction expansions of the regularized lower and
upper incomplete gamma functions, written out in full in the module docstring
rather than cited by equation number. The chi-square CDF with k degrees of
freedom is P(k/2, x/2); the quantile is obtained by bracketing bisection.
"""
citation = """
Wilson, E. B. and Hilferty, M. M., "The Distribution of Chi-Square", PNAS 17(12),
1931 (references.bib key wilson1931), for the approximation of equation
eq:ekf:wh, which this module reproduces for comparison but does not use to
compute any bound. The exact path uses only the incomplete gamma definitions.
"""
generation = """
Computed live. Validated in tests/python/test_refs_chi2.py against the two
closed-form cases the chi-square family admits: k = 2 is exponential, so the
quantile is exactly -2 ln(1 - p); k = 1 is a squared standard normal, so the
quantile is Phi^-1((1+p)/2)^2. Both agree to 1e-11 relative or better. The CDF
and quantile round-trip to 1e-11 over k in [1, 3000], the two incomplete-gamma
branches are shown to agree across their x = a + 1 crossover, and every
chi-square bound printed in a Phase 6 chapter is reproduced.

Independently cross-checked against scipy.stats.chi2.ppf during development
(worst relative deviation 2.4e-14 over p in [0.001, 0.999], k in [1, 3000]).
SciPy is not a dependency of the committed code or tests; the cross-check was a
one-off confirmation, not a gate.
"""
date = "2026-07-19"
tolerance = """
Quantiles: 1e-11 relative against the closed forms, set by the bisection's
termination at the last representable bit and the conditioning of the CDF near
the tails. Chapter-bound reproduction: 0.005 absolute, half a unit in the last
place the chapters print. Wilson-Hilferty error claim: the chapter asserts below
5e-5 relative for k >= 300; measured worst case is 1.17e-5 at k = 300.
"""

