sigma_b in the gate scenario, since a per-run bias makes the per-sample
statistics dependent and inflates the mean by (b/sigma)^2.
"""
date = "2026-07-19"
tolerance = """
Extraction exactness: 1e-14 rad absolute, at the rounding floor for a unit
quaternion logarithm. eq:optical:rho consistency: 1e-18, likewise. Aberration
