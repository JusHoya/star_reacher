generation = """
Computed live. Validated in tests/python/test_refs_pinhole.py. The convention
checks are the substance, because a projection reference is almost entirely a
statement about conventions:

- A point on the optical axis projects to exactly (c_x, c_y), with no rounding.
- The pixel-CENTRE origin is pinned analytically: with f = (W/2)/tan(alpha_h)
  and the principal point at (W-1)/2, a ray at exactly the horizontal half field
  of view lands at u = W - 1/2, the sensor edge this convention defines. Under
