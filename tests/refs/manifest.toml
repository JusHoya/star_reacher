- The four visibility tests are driven across each boundary independently: the
  near-side test flips exactly at the analytic spherical limb angle
  arccos(R/d) to within 1e-9 rad, and the occlusion test is shown to be a
  SEGMENT test (a sphere behind the camera or beyond the landmark does not
  occlude), which is what the clamp in eq:camera:occlusion is for.
- Aberration is confirmed to rotate the bearing without changing the emitted
