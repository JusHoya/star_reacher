deviation at p = 0.95 is 2.0 and 2.8 percentage points respectively) while still
catching a systematically miscalibrated interval.

The seeds in the single-ensemble gate tests are pinned deliberately: a two-sided
95 % interval rejects about one correct ensemble in twenty by construction, so a
seeded gate is the only form that is both meaningful and reproducible. The
coverage tests are what establish the rejection rate is the nominal one.
"""

