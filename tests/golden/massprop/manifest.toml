closed-form single-body removal that models a jettison event. Slug masses
are the committed propellant-mass inputs verbatim and all inputs are round
decimals, so composite masses are exact binary64 sums by construction
(the exit-criterion-2 wet-mass identity). Regenerating is
`python tests/golden/massprop/generate.py`; output is byte-deterministic.
"""

