# JPL Horizons geometric ICRF state vectors (VEC_CORR=NONE,
# REF_SYSTEM=ICRF, REF_PLANE=FRAME, OUT_UNITS=KM-S, epochs TDB).
# r_km / v_kmps carry the Horizons output fields verbatim; the raw
# request/response transcripts live in horizons/<quantity>.txt.
# 'composer' names the repack-side computation of the same geometric
# quantity: state:<body> is the body's stored segment; moon_minus_earth
# is the geocentric Moon composed from the EMB-relative moon and earth
# segments. All epochs are TDB midnights (exact in binary64 as both JD
# and seconds past J2000), so no epoch quantization enters the
# comparison. gate_m is 1.0 except for the two lunar quantities, which
# Horizons serves from DE441, not DE440: DE441's lunar orbit differs
# from DE440 by < 2 m over 1970-2020, growing ~10 m per century away
# from present (Park et al. 2021, AJ 161:105, Section 6), so their
# Horizons bound is a 10 m DE441 envelope and the authoritative DE440
# lunar gate lives in moon_de440_jplephem.toml (< 1 mm).
# Regenerated by generate.py.

