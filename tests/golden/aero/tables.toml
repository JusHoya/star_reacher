# Axisymmetric aero Mach tables consumed by the aero golden cases
# (FR-9, chapter ch:aero). electron_full and electron_upper are the
# committed FR-13 starter-fleet tables, copied column for column at
# generation time from the vehicles/ CSVs named in each case's
# source key (units per the CSV header: mach and ca dimensionless,
# cnalpha per radian, xcp_m meters in the structural frame -- origin
# at the aft plane, +X toward the nose). synthetic_clamp exists only
# to reach the below-table clamp branch. Provenance and tolerances
# in manifest.toml. Regenerated by generate.py.

