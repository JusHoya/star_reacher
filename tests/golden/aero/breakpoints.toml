# Force/moment reconstruction at every Mach breakpoint of both
# committed fleet tables (FR-9, Phase 4 exit criterion 8; chapter
# ch:aero, eq:aero:axial, eq:aero:normal, eq:aero:cpmoment), at 5
# deg nominal total alpha with a per-case crossflow roll. The
# airspeed is the breakpoint Mach times the dyadic speed of sound
# 256 m/s, so the case Mach equals the breakpoint to within one
# rounding of the velocity components. Evaluated with mpmath at 60
# significant decimal digits from the exact binary64 inputs and
# rounded once to binary64. Provenance and tolerances in
# manifest.toml. Regenerated by generate.py.

