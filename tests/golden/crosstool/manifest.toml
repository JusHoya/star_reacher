# Provenance manifest for the cross-tool frozen-truth set in this directory
# (Phase 3 exit criterion 5, D-15; schema documented in tests/golden/README.md).
# The two truth CSVs are the frozen external baselines the CI gates
# XTOOL-LEO-GRAV-GMAT and XTOOL-LEO-DRAG-OREKIT
# (tests/python/test_crosstool_frozen_truth.py) compare against; everything
# else in this directory is the exact configuration those baselines were
# generated with. Per D-15 the external tools ran offline on the maintainer
# machine; CI never installs GMAT or Orekit and consumes only these files.

schema_version = 1

[golden]
directory = "crosstool"
date = "2026-07-03"
generation = """
Method. Both committed missions (missions/leo_gravity_8x8.toml,
missions/leo_drag_hp.toml; replication specification in README.md) were
replicated in their external baseline tool and the tool's GCRF-equivalent
Cartesian state was exported on the exact 60 s grid over the full 7 days
(10081 rows including t = 0; fixed cadence, never adaptive-step rows), 16
significant digits, then frozen here as CSV. The comparison tests re-run
each mission with the installed package and compute the 3D position RMS
over all 10081 shared epochs; the mission truth logs are 1 Hz with exact
integer-second stamps, so the 60 s epochs align bit-exactly and no
interpolation enters the comparison.

Field identity. Both external tools were fed gravity fields generated by
scripts/crosstool/gen_field_files.py from the SAME committed coefficient
excerpt the missions load (tests/golden/gravity/earth_egm2008_n20.csv,
byte-locked to the .srgrav the missions read by test_gravity_data.py),
truncated to 8x8 with the excerpt's own constants GM = 3.986004415e14
m^3/s^2, R = 6378136.3 m. The GFC form round-trips every binary64 exactly
(repr formatting); the COF form carries 15 significant digits (GMAT's
fixed-column format), and the generator measured the worst relative
round-trip deviation over all 8x8 coefficients as exactly 0.0 (the source
excerpt's decimals carry at most 15 significant digits). Orekit's parsed
field was asserted at run time: mu, R, C(2,0), and the field constants
matched the committed excerpt bit-exactly.

Controlled-comparison configuration (convention alignment). The simulator
deliberately zeroes polar motion and dUT1 and ingests no EOP (PRD non-goal;
README.md "Earth orientation"). The external tools were configured to the
closest legitimate equivalent, and every such choice is recorded here:
1. GMAT ran with a startup-file override (gmat_startup_zeroeop.txt) whose
   EOP_FILE points at eopc04_zero.txt: IERS C04 layout with polar motion,
   UT1-UTC, LOD, dPsi, dEps all zero (gen_zero_eop.py). Leap seconds stay
   real (TAI-UTC = 37 s). GMAT's Earth orientation otherwise uses its
   FK5/IAU-76 reduction (NUTATION.DAT untouched) -- an irreducible tool
   difference vs the simulator's IAU 2006/2000B CIO chain, deliberately
   left in place as part of what the criterion measures.
2. Orekit ran against a curated data directory
   (build_orekit_zeroeop_data.py) whose ONLY EOP file is the zeroed
   finals2000A_zero.all, so the IERS-2010 frame chain evaluates with polar
   motion = 0, UT1 = UTC, dX = dY = 0; simpleEOP=true additionally disables
   Orekit's sub-daily tidal EOP interpolation model, which the simulator
   does not carry either. The run script asserts dUT1, pole, and CIP
   corrections are exactly zero at the epoch and refuses to run otherwise.
   Orekit's IAU 2000A nutation vs the simulator's 2000B (~1 mas) remains as
   an irreducible tool difference.
3. GMAT state input/output used the built-in EarthICRF system and Orekit
   used GCRF, the two tools' equivalents of the mission GCRF frame
   (stage-1 bootstrap proof, tools/bootstrap-notes/README.md).
4. GMAT integrated fixed-step (ErrorControl = None, RK89, 60 s steps,
   604800/60 = 10080 steps) so report rows land exactly on the comparison
   grid; measured max |ElapsedSecs - 60k| = 1.537e-7 s (about 1 mm
   along-track, negligible against the 10 m gate) and the first-row epoch
   was exactly UTCModJulian 31041.5 = 2026-01-01T00:00:00 UTC. Orekit
   integrated adaptively (DormandPrince853, tolerance provider dP = 1e-6 m,
   max step 60 s) and was sampled at exact 60 s offsets through its
   ephemeris dense output.
5. Spacecraft: point mass 500 kg both sides; drag case Cd*A/m = 0.0044
   m^2/kg entered in Orekit as IsotropicDrag(area = 1 m^2, Cd = 2.2) with
   mass 500 kg; Harris-Priester with Orekit's built-in mean-activity table
   (the committed transcription in tests/golden/atmosphere/ was
   cross-checked against it), cosine exponent n = 4, WGS84 ellipsoid
   (a = 6378137 m, 1/f = 298.257223563) on the zero-EOP ITRF, Sun from the
   curated directory's JPL DE440 (lnxp1990.440) -- the same DE440 family as
   the mission's committed excerpt.

Frozen baseline results (2026-07-03, measured by
tests/python/test_crosstool_frozen_truth.py and
scripts/crosstool/compare_rms.py):
- XTOOL-LEO-GRAV-GMAT: position RMS 0.015243 m (gate < 10 m: MET, margin
  ~656x), velocity RMS 1.663e-5 m/s, max |dr| = 0.0230 m at t = 501180 s;
  RMS radial/in-track/cross = 1.24e-5 / 1.162e-2 / 9.87e-3 m (a
  quasi-periodic orientation-difference signature, no secular trend).
- XTOOL-LEO-DRAG-OREKIT: position RMS 3.376229 m (gate < 100 m: MET,
  margin ~30x), velocity RMS 3.740e-3 m/s, max |dr| = 7.891 m at
  t = 604800 s; RMS radial/in-track/cross = 1.15e-2 / 3.376 / 1.45e-3 m
  with |dr| at day boundaries 0.12, 0.53, 1.25, 2.30, 3.71, 5.57, 7.89 m:
  a nearly pure in-track quadratic, i.e. a ~4e-4 relative difference in
  integrated drag effect (the 7-day drag displacement is ~20 km).
- Corroboration (informational, D-15 tie-breaker): the gravity-only case
  was also run through Orekit (same zero-EOP configuration, not frozen);
  sim vs Orekit position RMS = 0.0013130 m and GMAT vs Orekit = 0.0159378 m
  over the same grid, which localizes essentially all of the sim-vs-GMAT
  difference to GMAT's FK5/IAU-76 chain rather than to the field, the
  states, or the time systems. Three-way agreement at the centimeter level
  confirms field identity end to end (GMAT read the .cof, Orekit the .gfc).

Method controls and iteration history (all runs 2026-07-03, maintainer
machine, one external propagation at a time):
1. eopc04 column layout: the first gen_zero_eop.py draft placed the C04
   data columns at [19:89]; its own width assertion rejected every row
   (correct span [19:87], 3(I4),I7 then 2F11.6, 2F12.7, 2F11.6). Fixed in
   the generator before any output file existed; no frozen artifact was
   affected.
2. GFC formatting: the first gen_field_files.py draft printed numpy
   scalars ("np.float64(...)") into the gfc; caught on visual inspection
   before any Orekit run, fixed by casting to float before repr().
3. Zero-EOP effectiveness control: the GMAT case was re-run once with the
   STOCK startup file (real EOP; dUT1 = +0.0740683 s at epoch in that
   series): sim-vs-GMAT position RMS rises from 0.015 m to 3.140 m. This
   proves the --startup_file override was actually applied and quantifies
   what the controlled-comparison EOP alignment removes. The control
   output was not frozen.
4. Orekit integrator convergence: the drag case re-run with dP = 1e-4 m
   differs from the frozen dP = 1e-6 m baseline by position RMS 3.26e-5 m
   (max 5.03e-5 m), so integration error contributes negligibly to the
   3.38 m observed signal.
No simulator physics, mission file, or existing golden was modified at any
point; both gates passed on the first frozen comparison.

