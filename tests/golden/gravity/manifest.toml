# Provenance manifest for the gravity golden set in this directory
# (FR-22 layer 1: uncited golden = lint failure; schema documented in
# tests/golden/README.md). This manifest is also the committed fetch record
# for the FR-5 gravity sources: the source URLs and SHA-256 pins below are
# the ones `star data fetch egm2008 | grgm1200a | mro120f` enforces, so any
# workstream can re-verify the data/ files against this file without network.

schema_version = 1

[golden]
directory = "gravity"
date = "2026-07-02"
generation = """
All files are written by tests/golden/gravity/generate.py, which verifies
the three source coefficient files against the SHA-256 pins recorded in
python/star_reacher/data_fetch.py (fetching via the pipeline if absent),
truncates each to its excerpt degree, writes the full-precision CSV form,
re-reads that CSV and writes the SRGRAV v1 binary form from the re-read
values (so both committed forms are provably the same data), self-checks
pyshtools MakeGravGridPoint's output convention on a monopole field against
the closed form, evaluates the 20 exit-criterion-1 states with pyshtools
over the SAME committed excerpt coefficients, and cross-checks every golden
acceleration against a pure-Python mirror of the core's Pines recursions
(measured worst relative difference 2.7e-15 on 2026-07-02; generation-time
honesty check only). Regenerating is
`<venv-with-pyshtools> python tests/golden/gravity/generate.py`
(pyshtools 4.14.1, numpy 2.5.0, Python 3.12.10; network only if data/ is
empty; the committed outputs are consumed offline).

Source files (the committed fetch record; data/ itself stays git-ignored):
- EGM2008.gfc (252,140,870 bytes), retrieved 2026-07-02 from
  https://icgem.gfz.de/getmodel/gfc/c50128797a9cb62e936337c890e4425f03f0461d7329b09a8cc8561504465340/EGM2008.gfc
  SHA-256 ab5b524da073e63b5bdceb7ca47a0de07a26dd44a1c5798f39fc98dc80af70fd
  (gfc header: GM = 3.986004415e14 m^3/s^2, R = 6378136.3 m, tide_free,
  fully normalized).
- gggrx_1200a_sha.tab (88,059,844 bytes; GRGM1200A), retrieved 2026-07-02 from
  https://pds-geosciences.wustl.edu/grail/grail-l-lgrs-5-rdr-v1/grail_1001/shadr/gggrx_1200a_sha.tab
  SHA-256 fa04c3dce9376948ad243f3df74144e2602f12d183ea4d179604ed0a79da7ded
  (SHADR header: GM = 4902.8001224453001 km^3/s^2, R = 1738.0 km, fully
  normalized; the PDS label gggrx_1200a_sha.lbl, SHA-256
  c478c251e6e6bdd9fe130964e087a933c5db7f544b3f851fecd3e7a6f5729374, states
  the nominal Love number k2 = 0.024133 but no permanent-tide convention,
  recorded honestly as tide system "unknown").
- jgmro_120f_sha.tab (900,604 bytes; MRO120F), retrieved 2026-07-02 from
  https://pds-geosciences.wustl.edu/mro/mro-m-rss-5-sdp-v1/mrors_1xxx/data/shadr/jgmro_120f_sha.tab
  SHA-256 ddd3de9c30d75879fe37aa17a1149e7c96c141c095962954cb7ea865a2c025b6
  (SHADR header: GM = 0.4282837566395650e5 km^3/s^2, R = 3396.0 km, fully
  normalized; the PDS label jgmro_120f_sha.lbl, SHA-256
  bf50ba3a03c1c2ec8d63c3132a9b3cd89a5e880d546f195d9eb10a902ea0c80a, states
  the degree-2 coefficients exclude the permanent tide: tide-free). This
  source pin is independently corroborated: pyshtools 4.14.1 pins the
  identical SHA-256 for the same PDS URL in its dataset registry.

Full-degree repacks left in data/ for downstream workstreams (regenerable
bytes, pure functions of the pinned sources; recorded here so they can be
verified without refetching):
- data/egm2008_n70.srgrav
  SHA-256 47e2b65049dd7db379b0f2765c10e851628fa43fe5063d63fe38a37574ac52da
- data/grgm1200a_n120.srgrav
  SHA-256 0b9b0795ee125c15b0aa07557ed4c1bb3814da3b4bda284819309a1bda1d8e07
- data/mro120f_n80.srgrav
  SHA-256 a421e57351363613f823a4a0186e85fd448fbc23aef82c2fc91b3b4a14dacd84
"""

[[file]]
name = "earth_egm2008_n20.csv"
source = "EGM2008.gfc (SHA-256 ab5b524da073e63b5bdceb7ca47a0de07a26dd44a1c5798f39fc98dc80af70fd), ICGEM (GFZ) getmodel distribution, retrieved 2026-07-02; truncated to 20x20"
citation = "Pavlis, Holmes, Kenyon, and Factor, 'The development and evaluation of the Earth Gravitational Model 2008 (EGM2008)', Journal of Geophysical Research 117, B04406, 2012; ICGEM service: Ince et al., Earth System Science Data 11, 647-674, 2019"
generation = "write_excerpt_csv() in generate.py: one decimal-to-binary64 conversion per source value, printed with repr() so parsing recovers the identical binary64; GM/R from the gfc header; tide system tide_free per the gfc header"
date = "2026-07-02"
tolerance = "not applicable (input fixture; exact decimal round trip verified at generation time)"

