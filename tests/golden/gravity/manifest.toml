[[file]]
name = "pyshtools_accel.toml"
source = "pyshtools 4.14.1 (SHTOOLS backend) MakeGravGridPoint point evaluation over the committed excerpt coefficients at 20 body-fixed states (8 Earth incl. 8x8 and 20x20 truncations, 6 Moon 50x50, 6 Mars 20x20; latitudes to +/-89.95 deg near both poles)"
citation = "Wieczorek and Meschede, 'SHTools: Tools for Working with Spherical Harmonics', Geochemistry, Geophysics, Geosystems 19, 2574-2592, 2018; coefficient citations as the excerpt files"
generation = "generate.py: MakeGravGridPoint(cilm, gm, r0, r, lat, lon, lmax, omega=0) with GM/R from each excerpt's own header, output triad (g_r, g_theta, g_phi) mapped to Cartesian; the triad and sign convention are pinned by a monopole closed-form self-check that must pass to bit level before any golden is written. Positions and accelerations committed as binary64 hex"
date = "2026-07-02"
tolerance = "< 1e-12 relative on the acceleration-vector difference norm at every state (Phase 3 exit criterion 1), enforced by doctest GRAV-XTOOL-20. The bound is the exit criterion verbatim; the generation-time Pines-mirror cross-check measured worst 2.7e-15, so the gate carries ~2.5 orders of margin over independent-implementation agreement while any recursion, normalization, or frame defect fails it decisively"
