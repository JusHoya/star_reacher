# Rigid-body attitude RHS golden vectors (FR-1).
# qdot_ref is the quaternion kinematics 1/2 q (x) [0, w] (chapter
# ch:rigidbody, eq:rigidbody:qdot; Hamilton product, scalar-first,
# q_i2b per ch:notation) and wdot_ref_radps2 is Euler's equation
# with time-varying inertia I wdot = tau - w x (I w) - Idot w
# (eq:rigidbody:euler), both evaluated with mpmath at 60
# significant decimal digits from the exact binary64 inputs and
# rounded once to binary64. Matrices are row-major 9-vectors.
# qdot_exact / wdot_exact mark outputs whose values are exact in
# binary64 (structural zeros and exact products); the consuming
# test requires bit equality there. Provenance and tolerances in
# manifest.toml. Regenerated by generate.py.

