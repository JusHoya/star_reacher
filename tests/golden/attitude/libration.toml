# Gravity-gradient pitch libration references (FR-1, Phase 4 exit
# criterion 9). omega_lib_radps is the analytic small-angle pitch
# libration frequency n sqrt(3 (I_x - I_z) / I_y) of a rigid body
# on a prescribed circular orbit of radius r_m about a point-mass
# mu (chapter ch:gravgrad, eq:gravgrad:libfreq), with n the mean
# motion sqrt(mu/r^3); omega_lib_pendulum_radps applies the exact
# finite-amplitude pendulum correction pi/(2 K(sin^2 theta0))
# (eq:gravgrad:pendulum) for the committed initial pitch offset
# theta0_rad. All values evaluated with mpmath at 60 significant
# decimal digits from the exact binary64 inputs and rounded once
# to binary64. mu is the IERS Conventions (2010) GM_earth carried
# by star/constants.hpp; the consuming test asserts the equality.
# Provenance and tolerances in manifest.toml. Regenerated by
# generate.py.

[[case]]
name = "definition"
mu_m3ps2 = "0x1.6a8665bda5400p+48"
r_m = "0x1.ab3f000000000p+22"
i_diag_kgm2 = [
  "0x1.e000000000000p+6",
  "0x1.9000000000000p+6",
  "0x1.4000000000000p+6",
]
theta0_rad = "0x1.47ae147ae147bp-7"
t_span_s = "0x1.fbd0000000000p+15"
n_radps = "0x1.1a97ddc4bccb4p-10"
omega_lib_radps = "0x1.3590bc23c7058p-10"
omega_lib_decimal = "0.001180898173465136"
omega_lib_pendulum_radps = "0x1.358ec0f2ebae1p-10"
omega_lib_pendulum_decimal = "0.0011808686510723021"
