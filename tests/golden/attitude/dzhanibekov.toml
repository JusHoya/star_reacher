# Intermediate-axis (Dzhanibekov) flip references (FR-1, Phase 4
# exit criterion 4). The body I = diag(3, 2, 1) kg m^2 spins about
# its intermediate axis at 0.45 rad/s with a 1e-4 rad/s
# perturbation on axis 1 and the identity initial attitude.
# h0/t0 are the conserved angular momentum and kinetic energy from
# the exact binary64 initial state (mpmath, 60 digits, rounded
# once); w_ref checkpoints are an independent mpmath Taylor-series
# (mp.odefun, 50 dps, tol 1e-40) integration of Euler's equations
# (eq:rigidbody:euler). Checkpoints stop at 15 s because
# near-separatrix motion amplifies state differences as
# exp(lambda t) (chapter ch:rigidbody, eq:rigidbody:lambda);
# beyond that horizon the conserved quantities are the reference.
# Provenance and tolerances in manifest.toml. Regenerated by
# generate.py.

