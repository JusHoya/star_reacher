# Moon principal-axis frame golden vectors (FR-3). phi, theta, psi
# are the DE 3-1-3 libration Euler angles [rad]; c00..c22 is
# C_GCRF->MoonPA = R3(psi) R1(theta) R3(phi) (Park et al. 2021,
# DE440), assembled from ERFA rotation primitives (rz/rx) and
# cross-checked against an independent NumPy element-formula
# evaluation at generation time. Angle sets are committed test
# values (representative DE440 libration magnitudes plus degenerate
# geometry); the ephemeris evaluator supplying real angles is a
# separate workstream. Provenance and tolerances in manifest.toml.
# Regenerated by generate.py.

