# Provenance manifest for the Monte Carlo golden vectors in this directory
# (FR-22 layer 1: uncited golden = lint failure; schema documented in
# tests/golden/README.md).

schema_version = 1

[golden]
directory = "mc"
date = "2026-07-23"
generation = """
splitmix64_stream.toml pins the SplitMix64 stream the FR-27 Monte Carlo layer
derives its per-run seeds from: the per-run seed for run index i is element i
of core.splitmix64_stream(master_seed, n). The values are produced by the pure
Python integer mirror _splitmix64_stream in python/star_reacher/mc.py
(identical arithmetic to cpp/src/rng.cpp SplitMix64::next: increment
0x9E3779B97F4A7C15, Stafford variant-13 finalizer with multipliers
0xBF58476D1CE4E5B9 and 0x94D049BB133111EB and a final xorshift >> 31). The
seed_0 case is byte-for-byte identical to tests/golden/rng/splitmix64.toml case
seed_0, whose first output is the published SplitMix64 anchor for seed 0
(0xE220A8397B1DCDAF); that shared anchor ties this file to the same reference
implementation. tests/python/test_mc_seed.py asserts the compiled core binding,
the pure Python mirror, and these committed values agree bit-for-bit (and skips
only the "== core binding" clause on a checkout whose core predates the
binding). Regenerating: the values are the first 8 outputs of
_splitmix64_stream(seed, 8) for each listed seed.
"""

[[file]]
name = "splitmix64_stream.toml"
source = "_splitmix64_stream mirror in python/star_reacher/mc.py, matched against the compiled core's splitmix64_stream binding"
citation = "S. Vigna, splitmix64.c reference implementation (public domain, prng.di.unimi.it); algorithm from Steele, Lea, and Flood, 'Fast Splittable Pseudorandom Number Generators', OOPSLA 2014. Constants per cpp/src/rng.cpp SplitMix64::next."
citation_anchor = "seed_0 first output 0xE220A8397B1DCDAF, the published SplitMix64 output for seed 0, shared with tests/golden/rng/splitmix64.toml"
generation = "_splitmix64_stream(seed, 8) for each case's seed"
date = "2026-07-23"
tolerance = "exact (u64 bit equality)"
