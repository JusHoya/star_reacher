# SplitMix64 stream golden vectors for the FR-27 Monte Carlo per-run seed
# derivation. core.splitmix64_stream(seed, n) returns the first n outputs of a
# SplitMix64 seeded with `seed` (Vigna reference splitmix64.c); the per-run
# seed for run index i is element i of the stream. 8 consecutive outputs per
# seed. Unsigned 64-bit integers as "0x..." hex strings (TOML integers are
# signed 64-bit). seed_0's values are bit-identical to tests/golden/rng/
# splitmix64.toml case seed_0, which anchors this file to the same reference.

[[case]]
name = "seed_0"
seed = "0x0000000000000000"
values = [
  "0xE220A8397B1DCDAF",
  "0x6E789E6AA1B965F4",
  "0x06C45D188009454F",
  "0xF88BB8A8724C81EC",
  "0x1B39896A51A8749B",
  "0x53CB9F0C747EA2EA",
  "0x2C829ABE1F4532E1",
  "0xC584133AC916AB3C",
]

