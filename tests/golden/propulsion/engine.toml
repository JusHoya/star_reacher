# Engine thrust, mass-flow, and force/torque golden vectors (FR-10,
# Phase 4 exit criterion 3). thrust_N is
# F = lambda F_vac - p_amb A_e (chapter ch:propulsion,
# eq:propulsion:thrust); mdot_kgps is lambda F_vac / (g0 Isp_vac)
# with g0 = 9.80665 m/s^2 exact (eq:propulsion:mdot); force_N is
# thrust_N times the gimbal-deflected direction
# (eq:propulsion:direction, rotation about gimbal_axis_1 by
# gimbal_rad[0], then about gimbal_axis_2 by gimbal_rad[1]);
# torque_Nm is (position - cg) x force (eq:propulsion:forcetorque).
# Evaluated with mpmath at 60 significant decimal digits from the
# exact binary64 inputs and rounded once to binary64. The
# zero-throttle case is exactly zero in every output. Provenance
# and tolerances in manifest.toml. Regenerated by generate.py.

