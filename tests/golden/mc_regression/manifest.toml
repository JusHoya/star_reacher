# Provenance manifest for the Monte Carlo regression golden in this
# directory (FR-22 layer 6: uncited golden = lint failure; schema in
# tests/golden/README.md). The values_sha256 field is the two-key
# hash-gate: scripts/check_golden_manifests.py rejects any edit to a
# value file that did not go through scripts/golden_update.py --apply.

schema_version = 1

[golden]
directory = "mc_regression"
date = "2026-07-23"
generation = """
energy_stats.toml is regenerated by scripts/golden_update.py --apply, which runs the 128-run Latin-hypercube sweep missions/mc_regression_sweep.toml over the committed EGM2008 8x8 LEO mission (no fetched ephemeris), reads each run's final osculating specific mechanical energy energy_m2ps2 from the truth trajectory via the SRLOG loader, and freezes the ensemble size n, the metric mean, and the sample (ddof=1) standard deviation. The sweep is bit-reproducible from its master seed, so the statistics are exact numbers, recorded as binary64 hex literals. The Phase 7 exit-criterion-2 gate (star_reacher.mc_regression) checks a re-run's ensemble against these with a chi-square 99% two-sided interval on the standardized sum of squares and an Anderson-Darling 99% test of the standardized metric against N(mean, std).
"""

[[file]]
name = "energy_stats.toml"
source = "scripts/golden_update.py --apply, from the deterministic sweep missions/mc_regression_sweep.toml"
citation = "Anderson & Darling, 'A Test of Goodness of Fit', J. Amer. Statist. Assoc. 49(268), 1954, with the finite-n distribution of Marsaglia & Marsaglia, 'Evaluating the Anderson-Darling Distribution', J. Stat. Soft. 9(2), 2004 (star_reacher.anderson); the chi-square two-sided interval per star_reacher.consistency / Bar-Shalom, Li & Kirubarajan, 'Estimation with Applications to Tracking and Navigation', Wiley 2001, ch. 5. The frozen values are the outputs of the committed deterministic sweep, not a published constant."
generation = "scripts/golden_update.py --apply (runs the sweep, freezes n/mean/std)"
date = "2026-07-23"
tolerance = "gate, not a per-value tolerance: the chi-square statistic S = sum ((x-mean)/std)^2 must lie in [chi2_ppf(0.005, n), chi2_ppf(0.995, n)] and the Anderson-Darling p-value of the standardized metric against N(mean, std) must be >= 0.01. Measured at the frozen ensemble: S = 127.000 in [90.543, 172.957]; A2 = 1.408, p = 0.200. values_sha256 is exact byte equality of the value file."
values_sha256 = "7cfe54498af4ebf726cc98fe789866ada2666e7d2973868df8950908d3b97399"
