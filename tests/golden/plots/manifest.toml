source = "tests/golden/plots/generate.py: star run of missions/twobody_leo.toml + star_reacher.plotting.prepare_all on this machine (Windows 11 x64, MSVC-built core 0.4.0, commit 7aaa2e48a72eef49e118adcd449e12bfb3f72c7d)"
citation = "Feeding-array definitions per docs/formats/plots.md; osculating-element conventions per docs/formats/derived_elements.md (Vallado, Fundamentals of Astrodynamics and Applications, 4th ed., Alg. 9); geodetic latitude/altitude per Bowring, Survey Review 23(181), 1976 (two fixed passes, mirroring cpp/src/models/atmosphere_hp.cpp eq:hp:geodetic); GCRF->ITRF chain per the Phase 2 frames golden set (IAU 2006/2000B, tests/golden/frames/manifest.toml); reference propagation defined by missions/twobody_leo.toml"
generation = "python tests/golden/plots/generate.py (writes both value files; byte-deterministic per platform)"
date = "2026-07-04"
tolerance = "reltol arrays: |got - ref| <= 1e-9 * scale (scale = max |probe| committed per array; an all-zero array must stay exactly zero). Angle arrays: 1e-6 deg, absolute for the bounded i/lat, circular (mod 360) for the wrapping raan/argp/nu/lon. Derivation: the two-body reference propagation uses IEEE basic operations only and its measured cross-platform final-state divergence is 0.0 (tests/golden/determinism/cross_platform.toml, D-10 bound 1e-9), so the only cross-platform spread the arrays can carry is the array-preparation layer's own libm calls (atan2/sin/cos in elements, Bowring, and the frames chain), which is ulp-scale (~1e-16 relative, ~1e-13 deg); 1e-9 relative / 1e-6 deg keeps >= 6 orders of margin over that spread and still fails on any pipeline change at the ppb level. Events: bit-exact (times are fixed-step grid arithmetic in basic ops); config_sha256 and every n: exact."

