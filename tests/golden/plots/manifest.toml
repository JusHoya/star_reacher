# Provenance manifest for the FR-18 plot-feeding-array golden vectors in
# this directory (FR-22 layer 1: uncited golden = lint failure; schema
# documented in tests/golden/README.md).

schema_version = 1

[golden]
directory = "plots"
date = "2026-07-04"
generation = """
Both value files are written by tests/golden/plots/generate.py against the
repository state at commit 7aaa2e48a72eef49e118adcd449e12bfb3f72c7d (branch
ws-p5-plots base: phase-5-data-out). The script runs the two committed
reference missions through the project runner (star_reacher.runner
.run_mission, i.e. exactly what `star run` executes), loads each run.srlog
with the pure-NumPy loader, reduces it with star_reacher.plotting
.prepare_all (the array-preparation layer behind `star plot`), and freezes
every named plot-feeding array at fixed probe indices as binary64 hex
values, together with the run's resolved-config SHA-256 and the full event
stream. These are REGRESSION goldens for the Phase 5 exit-criterion-1
data-level gate: they pin the log -> plot-array pipeline against silent
change. They are deliberately NOT an independent rederivation of the
physics - the physical correctness of the underlying states is anchored
separately by the Phase 1-4 golden suites, the analytic benchmarks, and the
frozen cross-tool truth in tests/golden/crosstool/ (GMAT R2026a, Orekit
13.1.5). Regeneration: `.venv/Scripts/python tests/golden/plots/generate.py`
from the repository root with the compiled core installed; commit the diff
together with a manifest date update per the tests/golden/README.md update
policy.
"""

