tolerance = "reltol arrays: |got - ref| <= 1e-6 * scale (scale = max |probe| committed per array). Angle arrays: 1e-3 deg (absolute for i/lat, circular for raan/argp/nu/lon). Derivation: the ascent run bears libm-carrying models (USSA76 exp/pow, the IAU frames series, Bowring), so unlike the two-body case no cross-platform bit-identity claim exists; per-evaluation libm spread is O(1e-16) relative and accumulates over the <= 7,600 RK4 steps of the 760 s ascent with modest (non-chaotic) dynamic amplification, bounding the platform-to-platform state divergence at roughly 1e-8 relative - 1e-6 relative / 1e-3 deg keeps >= 2 orders of margin over that estimate while still failing on any model or pipeline change at the ppm level. Events: bit-exact (grid arithmetic; a flipped condition-trigger step, e.g. the terminal perigee_above insertion moving by one 0.1 s step, is a genuine regression signal and fails the n/t_s equality loudly). config_sha256 and every n: exact."

