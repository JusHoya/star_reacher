# Cross-platform determinism record (PRD Phase 2 exit criterion 8; D-10).
#
# The committed home of the measured cross-platform final-state divergence on
# the reference two-body propagation (missions/twobody_leo.toml) across the
# four CI legs. The cross-platform-divergence job in .github/workflows/ci.yml
# recomputes the value on every run (definition and gate rules in
# scripts/cross_platform_divergence.py) and fails while this record is
# pending, missing, or above the D-10 bound of 1e-9 relative.
#
# Update procedure (bootstrap and every refresh):
#
#   1. Let CI run on the phase branch. The cross-platform-divergence job
#      publishes the measurement as a commit status with context
#      "determinism/cross-platform" and description "max_rel=<value> ...".
#      The FIRST run fails this job by design (status below is pending).
#   2. Read the status without authentication (public repository):
#        GET https://api.github.com/repos/JusHoya/star_reacher/commits/<sha>/statuses
#      or the combined view:
#        GET https://api.github.com/repos/JusHoya/star_reacher/commits/<sha>/status
#   3. Set measured_max_rel to the published value, set status = "measured",
#      record the CI run URL in ci_run_url and the date in date, and commit.
#   4. The next run compares its fresh measurement against this record:
#      above 1e-9 fails; differing from measured_max_rel by more than a
#      factor of 10 prints a prominent warning without failing (runner-image
#      compiler updates legitimately move the last digits) - refresh via
#      this same procedure.
#
# If any measurement exceeds 1e-9, exit criterion 8 requires D-10's bound to
# be formally revised in the same change that updates this record.

schema_version = 2

[record]
status = "measured"
mission = "missions/twobody_leo.toml"
legs = ["ubuntu-24.04", "ubuntu-24.04-arm", "macos-15", "windows-2022"]
bound_rel = 1e-9
# First measurement (commit status "determinism/cross-platform" on
# 6bde73ca01a16454751be8a25cee6d4c525538a8: "max_rel=0.000e+00 (bound 1e-9,
# 4 legs)"): the four legs produced bit-identical final truth records. The
# reference propagation's arithmetic is add/subtract/multiply/divide/sqrt
# only - all IEEE-754 correctly-rounded operations with FMA contraction
# disabled (D-10) - so exact cross-platform agreement is the expected
# outcome for this case, not an anomaly; libm-induced divergence enters
# only with the transcendental-bearing models of later phases.
measured_max_rel = 0.0
ci_run_url = "https://github.com/JusHoya/star_reacher/actions/runs/28632023620"
date = "2026-07-02"

# ---------------------------------------------------------------------------
# Channel-level record (Phase 6 widening of exit criterion 8).
#
# The [record] table above measures two channels of one mission. The
# byte-determinism pass in docs/ci/phase6_crossplatform.md established that
# truth.r_m and truth.v_mps are exactly the channels that stay bit-identical
# across MSVC and GCC in every point-mass mission, so that record cannot see
# the divergence the same pass measured in the sensor, nav, env and guidance
# channels: four of its five missions read a final-state divergence of 0
# while their files differed in thousands of bytes.
#
# This table is the committed home of the channel-level measurement, taken
# over every channel of the five missions listed below. Channels split into
# an exact class compared for bit-identity and a tolerance class gated
# against tolerance_rel; the split, the divergence definition and the
# anti-degeneracy rules are in scripts/cross_platform_divergence.py.
#
# tolerance_rel is DERIVED, not chosen. It is the geometric mean of
#   - 1.06e-10, the worst scale-relative divergence measured anywhere in the
#     five-mission pass (gnc.cmd.w_cmd_b_radps, 760 s powered ascent,
#     Windows/MSVC against Linux/GCC, both x86-64), and
#   - 1e-9, the D-10 ceiling,
# giving sqrt(1.06e-10 * 1e-9) = 3.2557642...e-10, which sits a factor of
# 3.07 above the worst measurement and the same factor 3.07 below the D-10
# bound. The upper margin is headroom for the two CI legs whose libm has
# never been measured here (macos-15 and ubuntu-24.04-arm; aarch64 changes
# the instruction set, not merely the library). The lower margin is what
# keeps this gate capable of failing before D-10 already has.
#
# Update procedure: identical to the [record] table's, against the commit
# status context "determinism/cross-platform-channels". The FIRST run fails
# this half by design - status below is pending - because no CI measurement
# of these channels exists yet. The 1.06e-10 figure is the derivation input
# for the bound; it is a maintainer-host measurement across two of the four
# legs and is deliberately NOT transcribed here as though CI had produced it.
#
# If a measurement exceeds tolerance_rel, attribute the channel before
# widening the bound. A divergence larger than the derivation input on a
# channel nobody has looked at is a finding, not a calibration error.
# ---------------------------------------------------------------------------

[channels]
status = "pending-first-measurement"
tolerance_rel = 3.2557641192199413e-10
missions = [
  "ascent_leo_gnc",
  "leo_attitude_gnc",
  "leo_ekf_consistency",
  "leo_optical_nav",
  "twobody_leo",
]
