# Provenance manifest for the rotation-kernel golden vectors in this
# directory (FR-22 layer 1: uncited golden = lint failure; schema documented
# in tests/golden/README.md).

schema_version = 1

[golden]
directory = "rotations"
date = "2026-07-02"
generation = """
Both value files are written by tests/golden/rotations/generate.py. Every
committed matrix is produced by two independent constructions that must
agree element-wise to <= 1e-15 at generation time: (1) ERFA rotation
primitives via pyerfa 2.0.1.5 (ERFA 2.0.1) - erfa.rv2m for the Euler
axis-angle rotation vector of a unit quaternion, erfa.rx/ry/rz for Euler
sequence compositions; ERFA r-matrices are coordinate-transformation (frame
rotation) matrices, exactly this project's C_A^B convention - and (2) an
independent NumPy evaluation of the closed-form scalar-first attitude
matrix (Markley & Crassidis 2014; notation chapter eq:notation:quat2dcm)
and of the explicit R1/R2/R3 element formulas. Observed generation-time
cross-check maxima: 5.55e-16 (quaternion cases), 1.11e-16 (Euler cases).
pyerfa is a golden-generation dev tool only and is not a runtime
dependency. Regenerating is `python tests/golden/rotations/generate.py`;
output is byte-deterministic.
"""

[[file]]
name = "quat_dcm.toml"
source = "generate.py: erfa.rv2m (ERFA 2.0.1 via pyerfa 2.0.1.5) on the quaternion's axis-angle rotation vector, cross-checked against the independent NumPy closed-form attitude matrix"
citation = "Hamilton scalar-first quaternion and attitude-matrix conventions per project decision D-7 and Markley, F. L. & Crassidis, J. L., Fundamentals of Spacecraft Attitude Determination and Control, Springer (2014); frame-rotation matrix convention per the IAU SOFA Vector/Matrix library (ERFA 2.0.1 rv2m/rx/ry/rz)"
generation = "dcm_from_quat_erfa()/dcm_from_quat_np() in generate.py per case; quaternion inputs normalized from committed component lists, the first four non-identity cases making each component dominant in turn (Shepperd branch coverage)"
date = "2026-07-02"
tolerance = "consuming doctest compares the C++ quat->DCM against c00..c22 at abs 1e-15 per element (the generation-time spread between two independent constructions was 5.55e-16, and the C++ evaluation is a third rounding of the same closed form, so a few ulp of headroom is required; a convention error would show as O(1)); DCM->quat recovers the committed quaternion to abs 1e-15 per component up to overall sign, and the extraction's qw >= 0 convention is asserted separately"

[[file]]
name = "euler.toml"
source = "generate.py: erfa.rx/ry/rz frame-rotation compositions (ERFA 2.0.1 via pyerfa 2.0.1.5), cross-checked against independent NumPy element formulas"
citation = "Euler-sequence definitions (3-2-1: C = R1(a3) R2(a2) R3(a1); 3-1-3: C = R3(a3) R1(a2) R3(a1), frame rotations, angles in application order) per Markley & Crassidis (2014); primitive-rotation sign convention per the IAU SOFA Vector/Matrix library"
generation = "euler321_erfa()/euler313_erfa() and the NumPy mirrors in generate.py; includes gimbal-lock-adjacent cases (321 at a2 = +/-(pi/2 - 1e-2); 313 at a2 = 1e-2 and pi - 1e-2)"
date = "2026-07-02"
tolerance = "consuming doctest compares the C++ euler->DCM against c00..c22 at abs 1e-15 per element (generation-time cross-check spread was 1.11e-16; the C++ composition is a third rounding of the same primitives); DCM->euler->DCM round trips are gated separately by the criterion-6a rotation-equivalent bound, not by this file"
