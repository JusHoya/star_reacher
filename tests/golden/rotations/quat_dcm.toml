# Quaternion -> DCM golden vectors (FR-3, D-7).
# qw..qz is a unit Hamilton quaternion, scalar-first, interpreted as
# the frame transformation q_a2b; c00..c22 is the corresponding DCM
# C_A^B (coordinate transformation, v^B = C v^A) built with ERFA
# rotation primitives (rv2m) and cross-checked at generation time
# against an independent NumPy evaluation of the closed-form
# attitude matrix. The first four non-identity cases make each
# quaternion component dominant in turn, covering all four branches
# of the Shepperd DCM->quaternion extraction. Provenance and
# tolerances in manifest.toml. Regenerated by generate.py.

