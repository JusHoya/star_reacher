# RCS pulse golden vectors (FR-1, Phase 4 exit criterion 7).
# delivered_Ns is thrust_N * duration_s when that product is at or
# above mib_Ns and exactly zero below it (chapter ch:actuators,
# eq:actuators:mib); impulse_Ns is delivered_Ns times the unit
# thruster direction and angular_impulse_Nms is
# (position - cg) x impulse (eq:actuators:rcscoupling). Evaluated
# with mpmath at 60 significant decimal digits from the exact
# binary64 inputs and rounded once to binary64. The below-MIB case
# is exactly zero in every output. Provenance and tolerances in
# manifest.toml. Regenerated by generate.py.

[[case]]
name = "below_mib_exact_zero"
position_m = [
  "0x1.3333333333333p+0",
  "0x1.999999999999ap-2",
  "-0x1.3333333333333p-2",
]
direction = [
  "0x0.0p+0",
  "0x1.0000000000000p+0",
  "0x0.0p+0",
]
thrust_N = "0x1.6000000000000p+4"
mib_Ns = "0x1.47ae147ae147bp-6"
duration_s = "0x1.0624dd2f1a9fcp-11"
cg_m = [
  "0x1.ccccccccccccdp-1",
  "0x0.0p+0",
  "0x1.999999999999ap-4",
]
delivered_Ns = "0x0.0p+0"
impulse_Ns = [
  "0x0.0p+0",
  "0x0.0p+0",
  "0x0.0p+0",
]
angular_impulse_Nms = [
  "0x0.0p+0",
  "0x0.0p+0",
  "0x0.0p+0",
]

