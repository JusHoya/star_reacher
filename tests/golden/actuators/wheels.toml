# Reaction-wheel step golden vectors (FR-1, Phase 4 exit criterion
# 7). torque_Nm is the delivered wheel torque after the torque
# clamp and the momentum rail (chapter ch:actuators,
# eq:actuators:wheelclamp): commanded torque is clamped to
# [-torque_max, +torque_max]; if the resulting momentum would cross
# a rail the delivered torque is reduced so h1_Nms lands exactly on
# the rail, and it is exactly zero when the wheel starts on the
# rail and the command pushes further in the same sign.
# body_torque_Nm = -torque_Nm * axis (eq:actuators:wheelreaction).
# Evaluated with mpmath at 60 significant decimal digits from the
# exact binary64 inputs and rounded once to binary64. Provenance
# and tolerances in manifest.toml. Regenerated by generate.py.

[[case]]
name = "unclamped_delivery"
axis = [
  "0x0.0p+0",
  "0x0.0p+0",
  "0x1.0000000000000p+0",
]
torque_max_Nm = "0x1.999999999999ap-3"
momentum_max_Nms = "0x1.e000000000000p+4"
h0_Nms = "0x1.0000000000000p+1"
torque_cmd_Nm = "0x1.999999999999ap-5"
dt_s = "0x1.0000000000000p-1"
torque_Nm = "0x1.999999999999ap-5"
h1_Nms = "0x1.0333333333333p+1"
body_torque_Nm = [
  "0x0.0p+0",
  "0x0.0p+0",
  "-0x1.999999999999ap-5",
]

